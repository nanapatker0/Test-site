<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111111">
    <title>Book Your Date | Harvisha Pictures</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Inherited core styles from your main site */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #111111; color: #ffffff; line-height: 1.6; -webkit-font-smoothing: antialiased; }
        a { text-decoration: none; }
        
        header { position: fixed; top: 0; width: 100%; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 2px 10px rgba(0, 0, 0, .05); }
        .logo img { max-height: 45px; width: auto; display: block; }
        nav { display: flex; align-items: center; }
        nav a { margin-left: 20px; color: #111; font-size: 13px; text-transform: uppercase; font-weight: 500; letter-spacing: 0.5px; transition: color 0.3s ease; }
        nav a:hover { color: #777; }

        /* Booking Section Styles */
        .booking-section { padding: 120px 5% 80px 5%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: linear-gradient(rgba(17, 17, 17, 0.8), rgba(17, 17, 17, 0.9)), url("../images/BG.jpg"); background-size: cover; background-position: center; background-attachment: fixed; }
        .booking-title { font-family: "Playfair Display", serif; font-size: 42px; margin-bottom: 10px; color: #ffffff; text-align: center; }
        .booking-subtitle { color: #d4af37; text-transform: uppercase; letter-spacing: 2px; font-size: 13px; margin-bottom: 40px; text-align: center; font-weight: 500; }
        
        .booking-container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 700px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        
        .booking-form input, .booking-form select, .booking-form textarea { width: 100%; padding: 15px 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 14px; color: #ffffff; outline: none; transition: all 0.3s ease; }
        .booking-form input::placeholder, .booking-form textarea::placeholder { color: rgba(255, 255, 255, 0.4); }
        .booking-form select option { background: #111111; color: #ffffff; }
        .booking-form input:focus, .booking-form select:focus, .booking-form textarea:focus { border-color: #d4af37; background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15); }
        .booking-form textarea { resize: vertical; min-height: 120px; margin-bottom: 20px; }
        
        .submit-btn { width: 100%; height: 55px; background: #d4af37; color: #111111; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; }
        .submit-btn:hover { background: #f1c430; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3); }
        .submit-btn:disabled { background: #666; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Success Message */
        #success-message { display: none; text-align: center; padding: 20px; background: rgba(37, 211, 102, 0.1); border: 1px solid #25D366; border-radius: 8px; margin-top: 20px; color: #25D366; }

        footer { background: #111111; color: white; text-align: center; padding: 40px 20px; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="logo">
            <img src="../images/logo.png" alt="Harvisha Pictures Logo">
        </a>
        <nav id="nav-menu">
            <a href="../index.html">Home</a>
            <a href="../index.html#portfolio">Portfolio</a>
            <a href="../index.html#packages">Packages</a>
            <a href="../index.html#contact">Contact</a>
        </nav>
    </header>

    <section class="booking-section">
        <h1 class="booking-title">Reserve Your Date</h1>
        <p class="booking-subtitle">Let's Create Cinematic Magic Together</p>

        <div class="booking-container">
            <form id="google-sheet-form" class="booking-form">
                <div class="form-grid">
                    <input type="text" name="Name" placeholder="Full Name" required>
                    <input type="email" name="Email" placeholder="Email Address" required>
                    <input type="tel" name="Phone" placeholder="10 Digit Mobile Number" pattern="[0-9]{10}" required>
                    <input type="text" name="EventDate" required placeholder="Date of Event" onfocus="(this.type='date')" onblur="if(!this.value)this.type='text'">
                    
                    <select name="EventType" required>
                        <option value="wedding">Wedding</option>
                         <option value="sangeet">Sangeet</option>
                         <option value="anniversary">Anniversary</option>
                         <option value="birthday">Birthday</option>
                         <option value="rice-ceremony">Rice Ceremony</option>
                         <option value="corporate">Corporate</option>
                         <option value="others">Others</option>
                    </select>

                    <select name="Package" required>
                        <option value="" disabled selected>Select a Package</option>
                        <option value="Essential">🌿 Essential Package</option>
                        <option value="Signature">✨ Signature Package</option>
                        <option value="Royal">👑 Royal Package</option>
                        <option value="Custom">Need a Custom Quote</option>
                    </select>
                </div>

                <textarea name="Message" placeholder="Tell us more about your event (Venue, Special Requests, etc.)"></textarea>

                <button type="submit" id="submit-btn" class="submit-btn">Confirm Booking Inquiry</button>
            </form>
            
            <div id="success-message">
                <i class="fas fa-check-circle" style="font-size: 24px; margin-bottom: 10px;"></i><br>
                <strong>Thank you!</strong> Your booking inquiry has been sent successfully. Our team will contact you shortly.
            </div>
        </div>
    </section>

    <footer>
        <p style="margin-bottom: 5px;">© 2026 Harvisha Pictures</p>
        <p style="font-size: 13px; opacity: 0.7;">Wedding Photography & Cinematic Films</p>
    </footer>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyQcu-3X8UvRYj-vUrlZbwgSVZGfEuThaY-r29cqkx0AOAa6q5EbtXIA8H7r7iO2aZe/exec';
        const form = document.getElementById('google-sheet-form');
        const submitBtn = document.getElementById('submit-btn');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // Change button state
            submitBtn.innerText = 'Sending Inquiry...';
            submitBtn.disabled = true;

            // Gather form data
            let requestBody = new FormData(form);

            fetch(scriptURL, { method: 'POST', body: requestBody })
                .then(response => {
                    // Hide form and show success message
                    form.style.display = 'none';
                    successMessage.style.display = 'block';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert("Oops! Something went wrong. Please try again or contact us via WhatsApp.");
                    submitBtn.innerText = 'Confirm Booking Inquiry';
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
